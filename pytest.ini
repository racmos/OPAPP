[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --cov=app --cov-fail-under=79 --cov-report=term-missing
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    slow: tests that make network requests or run scrapers (deselect with '-m "not slow"')
    integration: tests that exercise full request/response cycle with database

{% extends "base.html" %}

{% block title %}Register - OP TCG Manager{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <h1><i class="fas fa-user-plus"></i> Register</h1>
        <form id="registerForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary">Register</button>
        </form>
        <div class="login-links">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a></p>
        </div>
        <div id="registerError" class="alert alert-error" style="display: none;"></div>
        <div id="registerSuccess" class="alert alert-success" style="display: none;"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('registerForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('registerError');
        const successDiv = document.getElementById('registerSuccess');

        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';

        const response = await fetch('/onepiecetcg/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, email: email, password: password })
        });

        const result = await response.json();
        if (result.success) {
            successDiv.textContent = result.message || 'Registration successful!';
            successDiv.style.display = 'block';
            setTimeout(() => {
                window.location.href = result.redirect || '/onepiecetcg/login';
            }, 1000);
        } else {
            errorDiv.textContent = result.message || 'Registration failed';
            errorDiv.style.display = 'block';
        }
    });
</script>
{% endblock %}

{% extends "base.html" %}

{% block title %}Profile - OP TCG Manager{% endblock %}

{% block content %}
<h1 style="color: var(--accent); margin-bottom: 2rem;">
    <i class="fas fa-user-circle"></i> User Profile
</h1>

<div class="card">
    <h2>Account Information</h2>
    <form id="profileForm">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" value="{{ user.username }}" disabled>
            <small>Username cannot be changed</small>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" value="{{ user.email or '' }}" required>
        </div>
        <div class="form-group">
            <label for="current_password">Current Password *</label>
            <input type="password" id="current_password" placeholder="Enter current password" required>
        </div>
        <div class="form-group">
            <label for="password">New Password (leave blank to keep current)</label>
            <input type="password" id="password" placeholder="Enter new password">
        </div>
        <div class="form-group">
            <label for="password_confirm">Confirm New Password</label>
            <input type="password" id="password_confirm" placeholder="Confirm new password">
        </div>
        <button type="submit" class="btn btn-primary">Update Profile</button>
    </form>
    <div id="profileMessage" style="margin-top: 1rem;"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('profileForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const currentPassword = document.getElementById('current_password').value;
        const password = document.getElementById('password').value;
        const passwordConfirm = document.getElementById('password_confirm').value;
        const messageDiv = document.getElementById('profileMessage');

        if (password && password !== passwordConfirm) {
            messageDiv.innerHTML = '<div class="alert alert-error">Passwords do not match</div>';
            return;
        }

        const data = {
            current_password: currentPassword,
            email: document.getElementById('email').value
        };

        if (password) {
            data.new_password = password;
        }

        const response = await fetch('/onepiecetcg/profile/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();
        if (result.success) {
            messageDiv.innerHTML = '<div class="alert alert-success">Profile updated successfully</div>';
            document.getElementById('current_password').value = '';
            document.getElementById('password').value = '';
            document.getElementById('password_confirm').value = '';
        } else {
            messageDiv.innerHTML = '<div class="alert alert-error">' + (result.message || 'Update failed') + '</div>';
        }
    });
</script>
{% endblock %}
